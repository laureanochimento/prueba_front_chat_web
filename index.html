<!-- Scripting Context -->
<script>const API_KEY = 'app-eApQYaNB74wAmRgNgWxytelf';
        const API_URL = 'http://dify.engineconsulting.com.ar/v1/chat-messages';
        const chatCanvas = document.getElementById('chat-canvas');
        const userInput = document.getElementById('user-input');
        const sendButton = document.getElementById('send-button');

        function appendMessage(role, text, isStreaming = false) {
            const wrapper = document.createElement('div');
            wrapper.className = role === 'user' 
                ? 'flex flex-col items-end self-end max-w-[85%]' 
                : 'flex flex-col items-start max-w-[85%]';
            
            const bubbleClasses = role === 'user'
                ? 'ochre-gradient text-primary-container user-bubble shadow-[0px_4px_15px_rgba(175,144,113,0.2)]'
                : 'bg-primary-container text-white bot-bubble shadow-sm';

            wrapper.innerHTML = `
                <div class="${bubbleClasses} px-6 py-4 rounded-xl">
<p class="font-body ${role === 'user' ? 'font-medium' : 'font-light'} text-lg leading-relaxed message-content">${text}</p>
</div>
<span class="mt-2 text-[10px] font-medium uppercase tracking-[0.05em] text-slate-500 font-label">
                    ${role === 'user' ? 'YOU' : 'ENGINE'} • NOW
                </span>
            `;
            
            chatCanvas.appendChild(wrapper);
            chatCanvas.scrollTop = chatCanvas.scrollHeight;
            return wrapper.querySelector('.message-content');
        }

        async function sendMessage() {
            const text = userInput.value.trim();
            if (!text) return;

            userInput.value = '';
            appendMessage('user', text);

            const botMessageElement = appendMessage('bot', '...');
            let fullResponse = '';

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Authorization': `Bearer ${API_KEY}`,
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        "inputs": {},
                        "query": text,
                        "response_mode": "streaming",
                        "user": "usuario_web_unique"
                    })
                });

                if (!response.ok) throw new Error('API request failed');

                const reader = response.body.getReader();
                const decoder = new TextDecoder();
                
                botMessageElement.innerText = ''; // Clear the "..."

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data:')) {
                            try {
                                const data = JSON.parse(line.slice(5));
                                if (data.event === 'message' || data.event === 'agent_message') {
                                    fullResponse += data.answer || '';
                                    botMessageElement.innerText = fullResponse;
                                    chatCanvas.scrollTop = chatCanvas.scrollHeight;
                                }
                            } catch (e) {
                                // Ignore non-JSON chunks
                            }
                        }
                    }
                }
            } catch (error) {
                botMessageElement.innerText = "Apologies, but I encountered a disruption in our connection. Please ensure your API key is valid.";
                botMessageElement.classList.add('text-error');
            }
        }

        sendButton.addEventListener('click', sendMessage);
        userInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') sendMessage();
        });</script>
