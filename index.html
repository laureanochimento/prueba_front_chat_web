<!DOCTYPE html>

<html class="light" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" name="viewport"/>
<title>ENGINE | Editorial AI</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;700;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        .ochre-gradient {
            background: linear-gradient(135deg, #AF9071 0%, #D6B89D 100%);
        }
        .chat-container::-webkit-scrollbar {
            width: 4px;
        }
        .chat-container::-webkit-scrollbar-track {
            background: transparent;
        }
        .chat-container::-webkit-scrollbar-thumb {
            background: #dbe1ff;
            border-radius: 10px;
        }
        .bot-bubble {
            border-bottom-left-radius: 0 !important;
            background-color: #222C4F;
            color: white;
        }
        .user-bubble {
            border-bottom-right-radius: 0 !important;
            background-color: #CBAD91;
            color: black;
        }
        body {
            min-height: 100dvh;
            background-color: #ffffff;
        }
    </style>
</head>
<body class="font-body text-on-surface flex flex-col h-screen overflow-hidden">
<!-- Header -->
<header class="fixed top-0 w-full z-50 bg-[#0E1730] flex items-center justify-between px-6 h-16">
<button class="text-[#e0c1a4] hover:text-[#e0c1a4] transition-colors scale-95 active:duration-150">
<span class="material-symbols-outlined">menu</span>
</button>
<div class="text-xl font-bold tracking-[-0.02em] text-white font-headline uppercase">ENGINE</div>
<button class="text-[#e0c1a4] hover:text-[#e0c1a4] transition-colors scale-95 active:duration-150">
<span class="material-symbols-outlined">settings</span>
</button>
</header>
<!-- Chat Canvas -->
<!-- Added pb-48 to ensure space for both input field and bottom nav -->
<main class="flex-1 overflow-y-auto chat-container pt-20 pb-48 px-4 md:px-8 max-w-4xl mx-auto w-full flex flex-col space-y-6" id="chat-canvas"></main>
<!-- Bottom Navigation (Mobile) -->
<nav class="md:hidden fixed bottom-0 w-full z-50 rounded-t-xl bg-white shadow-[0px_-10px_30px_rgba(18,26,52,0.05)] flex justify-around items-center h-20 px-4 pb-safe border-t border-slate-100">
<a class="flex flex-col items-center justify-center text-[#af9071] font-bold transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined">chat_bubble</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Chat</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:opacity-80 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined">history</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">History</span>
</a>
<a class="flex flex-col items-center justify-center text-slate-500 hover:opacity-80 transition-transform active:scale-95" href="#">
<span class="material-symbols-outlined">tune</span>
<span class="font-['Inter'] text-[10px] font-medium uppercase tracking-[0.05em]">Settings</span>
</a>
</nav>
<!-- Input Area -->
<!-- Positioned bottom-20 to sit exactly above the 20-unit (h-20) bottom nav -->
<div class="fixed bottom-20 left-0 w-full px-4 pb-4 z-40 bg-white/80 backdrop-blur-sm">
<div class="max-w-4xl mx-auto">
<div class="bg-slate-50 border border-slate-100 rounded-2xl p-2 shadow-[0px_10px_30px_rgba(18,26,52,0.05)] flex items-center gap-2">
<input class="flex-1 bg-white border-none focus:ring-0 rounded-xl px-6 py-4 font-body font-light text-on-surface placeholder:text-slate-400" id="user-input" placeholder="Compose a message..." type="text"/>
<button class="ochre-gradient text-white w-12 h-12 rounded-xl flex items-center justify-center shadow-[0px_4px_15px_rgba(175,144,113,0.3)] transition-transform active:scale-90" id="send-button">
<span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
</button>
</div>
</div>
</div>
<script>
    const API_KEY = 'app-eApQYaNB74wAmRgNgWxytelf';
    const API_URL = 'http://dify.engineconsulting.com.ar/v1/chat-messages';
    const chatCanvas = document.getElementById('chat-canvas');
    const userInput = document.getElementById('user-input');
    const sendButton = document.getElementById('send-button');

    function appendMessage(role, text) {
        const wrapper = document.createElement('div');
        wrapper.className = role === 'user' 
            ? 'flex flex-col items-end self-end max-w-[85%]' 
            : 'flex flex-col items-start max-w-[85%]';
        
        const bubbleClasses = role === 'user' ? 'user-bubble' : 'bot-bubble';

        wrapper.innerHTML = `
            <div class="${bubbleClasses} px-6 py-4 rounded-xl shadow-sm">
                <p class="font-body ${role === 'user' ? 'font-medium' : 'font-light'} text-lg leading-relaxed message-content">${text}</p>
            </div>
            <span class="mt-2 text-[10px] font-medium uppercase tracking-[0.05em] text-slate-500 font-label">
                ${role === 'user' ? 'YOU' : 'ENGINE'} • NOW
            </span>
        `;
        
        chatCanvas.appendChild(wrapper);
        chatCanvas.scrollTop = chatCanvas.scrollHeight;
        return wrapper.querySelector('.message-content');
    }

    async function sendMessage() {
        const text = userInput.value.trim();
        if (!text) return;

        userInput.value = '';
        appendMessage('user', text);

        const botMessageElement = appendMessage('bot', '...');
        let fullResponse = '';

        try {
            const response = await fetch(API_URL, {
                method: 'POST',
                headers: {
                    'Authorization': `Bearer ${API_KEY}`,
                    'Content-Type': 'application/json'
                },
                body: JSON.stringify({
                    "inputs": {},
                    "query": text,
                    "response_mode": "streaming",
                    "user": "usuario_web_unique"
                })
            });

            if (!response.ok) throw new Error('API request failed');

            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            
            botMessageElement.innerText = ''; 

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;

                const chunk = decoder.decode(value, { stream: true });
                const lines = chunk.split('\n');

                for (const line of lines) {
                    if (line.trim().startsWith('data:')) {
                        try {
                            const jsonString = line.trim().slice(5).trim();
                            if (!jsonString) continue;
                            const data = JSON.parse(jsonString);
                            if (data.event === 'message' || data.event === 'agent_message') {
                                fullResponse += data.answer || '';
                                botMessageElement.innerText = fullResponse;
                                chatCanvas.scrollTop = chatCanvas.scrollHeight;
                            }
                        } catch (e) {
                            console.error('Error parsing stream chunk', e);
                        }
                    }
                }
            }
        } catch (error) {
            console.error('Chat error:', error);
            botMessageElement.innerText = "Apologies, but I encountered a disruption in our connection. Please ensure the service is available.";
            botMessageElement.classList.add('text-red-400');
        }
    }

    sendButton.addEventListener('click', sendMessage);
    userInput.addEventListener('keypress', (e) => {
        if (e.key === 'Enter') sendMessage();
    });
</script>
</body></html>
